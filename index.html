<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .box{
      width: 16rem;
      height: 25rem;
      background:hsl(0, 0%, 100%);
      border-radius: 1rem;
      margin: 0 auto;
      transform: translateY(50%);
    }

    img {
      width: 14.5rem;
      border-radius: 0.35rem;
      margin-left: 0.74rem;
      margin-top: 0.74rem;
    }

    .container {
      margin: 0 auto;
      text-align: center;
      width: 12rem;
      height: 16rem;
      padding-left: 0rem;
      padding-right: 0rem;
    }

    #header {
      margin-left: auto;
      font-size: 0.95rem;
      font-family: "Outfit", sans-serif;
      font-optical-sizing: auto;
      font-weight: 700;
      font-style: normal;
      line-height: 1.25rem;
      color: hsl(218, 44%, 22%);
    }

    #description {
      font-size: 0.68rem;
      font-family: "Outfit", sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
      line-height: 1rem;
      color: hsl(216, 15%, 48%);
    }

    body {
      background-color: hsl(212, 45%, 89%);
    }

    .attribution { 
      position: absolute;
      margin: 0 auto;
      bottom: 0.3125rem;
      font-size: 0.6875rem; 
    }

    .attribution a { 
      color: hsl(228, 45%, 44%); 
    }
  </style>
</head>
<body>
  <section class="box">
    <div id="qr-code">
        <img src="images/image-qr-code.png" alt="QR Code Reader" />
    </div>
    <div class="container">
      <h2 id="header">
        Improve your front-end skills by building projects
      </h2>
      <p id="description">
        Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
      </p>
    </div>
  </section>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Youngeun</a>.
  </div>
</body>
</html>
